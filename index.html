<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='white'/></svg>">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Material Solace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --text: #000000;
      --line: rgba(0, 0, 0, 0.16);
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      background: #ffffff;
      color: var(--text);
    }

    .hero__bg {
      position: absolute;
      inset: 0;
      background: #ffffff;
    }

    .center-mark {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 3;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.9s ease;
      pointer-events: none;
      width: auto;
      max-width: 90vw;
    }

    .center-mark.is-visible {
      opacity: 1;
    }

    .center-mark__text {
      font-family: 'Roboto Mono', monospace;
      font-size: clamp(1rem, 6vw, 2em);
      color: black;
      white-space: nowrap;
    }

    .bottom-wrap {
      position: absolute;
      left: 34px;
      right: 34px;
      bottom: 30px;
      z-index: 6;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
    }

    .footer-left {
      width: min(360px, 100%);
      position: relative;
      z-index: 10;
    }

    .tagline {
      margin: 0 0 26px 0;
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .contact-block {
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .contact-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .contact-toggle {
      appearance: none;
      width: 100%;
      background: transparent;
      border: 0;
      color: var(--text);
      padding: 18px 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      font: inherit;
      font-size: 0.88rem;
      text-align: left;
    }

    .contact-dot {
      position: relative;
      width: 12px;
      height: 12px;
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .contact-dot::before,
    .contact-dot::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: #000000;
      transition: transform 0.35s ease, opacity 0.35s ease;
    }

    .contact-dot::before {
      width: 12px;
      height: 2px;
    }

    .contact-dot::after {
      width: 2px;
      height: 12px;
    }

    .contact-block.is-open .contact-dot::after {
      transform: scaleY(0);
      opacity: 0;
    }

    .contact-panel {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-8px);
      transition: max-height 0.45s ease, opacity 0.3s ease, transform 0.35s ease, padding 0.35s ease;
      padding: 0;
    }

    .contact-block.is-open .contact-panel {
      max-height: 260px;
      opacity: 1;
      transform: translateY(0);
      padding: 2px 0 18px;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 22px;
      row-gap: 18px;
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .contact-item p,
    .contact-full p {
      margin: 0;
    }

    .contact-heading {
      margin-bottom: 2px;
    }

    .contact-link {
      color: var(--text);
      text-decoration: none;
    }

    .contact-link:hover {
      text-decoration: underline;
    }

    .contact-full {
      grid-column: 1 / -1;
    }

    .footer-right {
      font-size: 0.88rem;
      line-height: 1.2;
      text-align: right;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      .bottom-wrap {
        left: 20px;
        right: 20px;
        bottom: 20px;
        flex-direction: column;
        align-items: flex-start;
      }

      .footer-right {
        text-align: left;
        white-space: normal;
      }

      .footer-left {
        width: 100%;
      }

      .contact-grid {
        grid-template-columns: 1fr;
      }

    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="hero__bg"></div>

    <div class="center-mark" id="centerMark" aria-hidden="true">
      <div class="center-mark__text">Material Solace</div>
    </div>

    <div class="bottom-wrap">
      <div class="footer-left">
        <p class="tagline">Product design studio.</p>

        <div class="contact-block" id="contactBlock">
          <div class="contact-row">
            <button
              class="contact-toggle"
              id="contactToggle"
              aria-expanded="false"
              aria-controls="contactPanel"
              type="button"
            >
              <span>Contact</span>
              <span class="contact-dot" aria-hidden="true"></span>
            </button>
          </div>

          <div class="contact-panel" id="contactPanel">
            <div class="contact-grid">
              <div class="contact-item">
                <p class="contact-heading">Work with us:</p>
                <a class="contact-link" href="mailto:hello@materialsolace.com">hello@materialsolace.com</a>
              </div>

<div class="contact-full">
                <a class="contact-link" href="https://instagram.com/materialsolace" target="_blank" rel="noopener noreferrer">@materialsolace</a>
              </div>

              <div class="contact-full">
                <p>London, United Kingdom.</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="footer-right" id="clock"></div>
    </div>
  </main>

  <script>
    function updateClock() {
      const now = new Date();
      const formatter = new Intl.DateTimeFormat("en-GB", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
        timeZoneName: "short",
        weekday: "long",
        month: "short",
        day: "numeric",
        year: "numeric"
      });

      const parts = formatter.formatToParts(now);
      const map = Object.fromEntries(parts.map(part => [part.type, part.value]));

      const timeText = `${map.hour}:${map.minute} ${map.timeZoneName}`.trim();
      const dateText = `${map.weekday}, ${map.day} ${map.month} ${map.year}`.trim();

      document.getElementById("clock").textContent = `${timeText}. ${dateText}`;
    }

    const contactToggle = document.getElementById("contactToggle");
    const contactBlock = document.getElementById("contactBlock");

    contactToggle.addEventListener("click", () => {
      const isOpen = contactBlock.classList.toggle("is-open");
      contactToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
    });

    window.addEventListener("load", () => {
      document.getElementById("centerMark").classList.add("is-visible");
      updateClock();
      setInterval(updateClock, 60000);
    });
  </script>
</body>
</html>
